name: Download and Upload to ArvanCloud Storage

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download file
        run: |
          echo "=== Downloading file ==="

          curl -L -o v2rayN-linux-rhel-64.rpm \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-linux-rhel-64.rpm

          ls -lh v2rayN-linux-rhel-64.rpm

      - name: Install AWS CLI v2 (official)
        run: |
          echo "=== Installing AWS CLI v2 ==="

          sudo apt-get update
          sudo apt-get install -y curl unzip

          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
            -o "awscliv2.zip"

          unzip -q awscliv2.zip

          sudo ./aws/install

          aws --version

      - name: Configure AWS credentials
        run: |
          echo "=== Configuring AWS CLI ==="

          aws configure set aws_access_key_id ${{ secrets.ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.SECRET_KEY }}
          aws configure set default.region us-east-1

      - name: Test connectivity
        run: |
          echo "=== Testing endpoint ==="
          curl -I https://${{ secrets.STORAGE_ENDPOINT }} || true

      - name: Upload to ArvanCloud (FAST MULTIPART)
        run: |
          echo "=== Uploading file ==="

          aws s3 cp v2rayN-linux-rhel-64.rpm \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }} \
            --only-show-errors

      - name: Verify upload
        run: |
          echo "=== Listing bucket ==="

          aws s3 ls s3://${{ secrets.STORAGE_BUCKET }}/ \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }}

      - name: Check file info
        run: |
          echo "=== File verification ==="

          aws s3 ls \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }}
