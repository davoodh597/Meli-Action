name: Download and Upload to ArvanCloud Storage

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download v2rayN RPM file
        run: |
          curl -L -o v2rayN-linux-rhel-64.rpm \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-linux-rhel-64.rpm
      
      - name: Install s3cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd
      
      - name: Create s3cmd config
        run: |
          cat > ~/.s3cfg << EOF
          [default]
          access_key = ${{ secrets.ACCESS_KEY }}
          secret_key = ${{ secrets.SECRET_KEY }}
          host_base = ${{ secrets.STORAGE_ENDPOINT }}
          host_bucket = ${{ secrets.STORAGE_BUCKET }}.${{ secrets.STORAGE_ENDPOINT }}
          use_https = True
          signature_v2 = False
          EOF
      
      - name: Upload to ArvanCloud
        run: |
          s3cmd put v2rayN-linux-rhel-64.rpm \
            s3://${{ secrets.STORAGE_BUCKET }}/
