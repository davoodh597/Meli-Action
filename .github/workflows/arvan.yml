name: Download and Upload to ArvanCloud Storage

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download v2rayN RPM file
        run: |
          curl -L -o v2rayN-linux-rhel-64.rpm \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-linux-rhel-64.rpm
      
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
      
      - name: Configure rclone for ArvanCloud
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ secrets.ACCESS_KEY }}
          secret_access_key = ${{ secrets.SECRET_KEY }}
          endpoint = https://${{ secrets.STORAGE_ENDPOINT }}
          region = ir-thr-at1
          acl = private
          no_check_bucket = true
          EOF
      
      - name: Upload to ArvanCloud
        run: |
          rclone copy v2rayN-linux-rhel-64.rpm arvan:${{ secrets.STORAGE_BUCKET }}/
      
      - name: List files to verify
        run: |
          rclone ls arvan:${{ secrets.STORAGE_BUCKET }}/
