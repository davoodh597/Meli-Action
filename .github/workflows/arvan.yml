name: Download and Upload to ArvanCloud Storage

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download file
        run: |
          echo "=== Downloading file ==="

          curl -L -o v2rayN-linux-rhel-64.rpm \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-linux-rhel-64.rpm

          ls -lh v2rayN-linux-rhel-64.rpm

      - name: Install or update AWS CLI v2
        run: |
          echo "=== Installing AWS CLI v2 ==="

          # GitHub runners often already contain AWS CLI
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already installed:"
            aws --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y curl unzip

          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
            -o "awscliv2.zip"

          unzip -u awscliv2.zip

          sudo ./aws/install --update

          aws --version

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "=== AWS credentials configured ==="

      - name: Test endpoint connectivity
        run: |
          echo "=== Testing endpoint ==="

          curl -I https://${{ secrets.STORAGE_ENDPOINT }} || true

      - name: Upload file to ArvanCloud
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "=== Uploading file ==="

          aws s3 cp \
            v2rayN-linux-rhel-64.rpm \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }} \
            --only-show-errors

      - name: Verify upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "=== Verifying upload ==="

          aws s3 ls \
            s3://${{ secrets.STORAGE_BUCKET }}/ \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }}

          aws s3 ls \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm \
            --endpoint-url https://${{ secrets.STORAGE_ENDPOINT }}
