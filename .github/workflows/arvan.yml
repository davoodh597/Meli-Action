name: Download and Upload to ArvanCloud Storage

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download v2rayN RPM file
        run: |
          echo "=== Downloading file from GitHub ==="

          curl -L -o v2rayN-linux-rhel-64.rpm \
            https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-linux-rhel-64.rpm

          echo "=== Download complete ==="
          ls -lh v2rayN-linux-rhel-64.rpm

      - name: Install s3cmd
        run: |
          echo "=== Installing s3cmd ==="

          sudo apt-get update
          sudo apt-get install -y s3cmd ca-certificates

          echo "=== s3cmd version ==="
          s3cmd --version

      - name: Test connectivity
        run: |
          echo "=== Testing endpoint connectivity ==="

          curl -I https://${{ secrets.STORAGE_ENDPOINT }} || true

          echo "=== DNS lookup ==="
          getent hosts ${{ secrets.STORAGE_ENDPOINT }} || true

      - name: Create s3cmd config
        run: |
          echo "=== Creating ~/.s3cfg ==="

          cat > ~/.s3cfg << EOF
          [default]
          access_key = ${{ secrets.ACCESS_KEY }}
          secret_key = ${{ secrets.SECRET_KEY }}

          host_base = ${{ secrets.STORAGE_ENDPOINT }}
          host_bucket = ${{ secrets.STORAGE_ENDPOINT }}

          use_https = True
          signature_v2 = False

          enable_multipart = False

          check_ssl_certificate = True
          check_ssl_hostname = True

          socket_timeout = 300

          human_readable_sizes = True
          encoding = UTF-8

          verbosity = DEBUG
          EOF

          echo "=== Config created ==="
          cat ~/.s3cfg

      - name: Test bucket access
        run: |
          echo "=== Listing buckets ==="

          s3cmd ls

          echo "=== Checking bucket ==="

          s3cmd ls s3://${{ secrets.STORAGE_BUCKET }}/

      - name: Upload file to ArvanCloud
        run: |
          echo "=== Starting upload ==="

          s3cmd put \
            --disable-multipart \
            --no-check-md5 \
            --progress \
            v2rayN-linux-rhel-64.rpm \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm

          echo "=== Upload completed ==="

      - name: Verify uploaded file
        run: |
          echo "=== Verifying uploaded file ==="

          s3cmd info \
            s3://${{ secrets.STORAGE_BUCKET }}/v2rayN-linux-rhel-64.rpm

          echo "=== Bucket contents ==="

          s3cmd ls \
            s3://${{ secrets.STORAGE_BUCKET }}/

      - name: Test direct file access
        run: |
          echo "=== Testing public URL ==="

          curl -I \
            https://${{ secrets.STORAGE_BUCKET }}.${{ secrets.STORAGE_ENDPOINT }}/v2rayN-linux-rhel-64.rpm \
            || true
